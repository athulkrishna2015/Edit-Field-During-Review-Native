name: checks

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python Files
        run: python -m compileall -q bump.py make_ankiaddon.py addon

      - name: Validate Version Metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          from bump import read_current_version

          print(read_current_version(Path("addon")))
          PY

      - name: Smoke Test Packaging
        run: python make_ankiaddon.py 0.0.1
